# ---------------------------------------------------------------------------
# Central configuration for the Walmart weekly-sales forecasting pipeline.
# Edit values here rather than in code - train.py and serve.py both read
# this file at runtime.
# ---------------------------------------------------------------------------

data:
  train_csv: /data/train.csv
  features_csv: /data/features.csv
  stores_csv: /data/stores.csv
  test_size: 0.2          # chronological 80/20 split, matches the notebook

mlflow:
  tracking_uri: http://mlflow:5000
  experiment_name: walmart-weekly-sales
  registry_model_name: walmart-sales-forecaster

models:
  random_forest:
    n_estimators: 80
    max_depth: 15
    min_samples_split: 2
    min_samples_leaf: 1
    random_state: 42
    n_jobs: -1
  xgboost:
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.05
    random_state: 42
    n_jobs: -1
