version: "3.9"
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 5s
      timeout: 3s
      retries: 10
  trainer:
    build:
      context: .
      dockerfile: Dockerfile.train
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
      - mlflow_data:/mlflow
    profiles: ["train"]
  api:
    build:
      context: .
      dockerfile: Dockerfile.serve
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped
volumes:
  mlflow_data: